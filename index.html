<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luciano P. de Moura | Análise de Dados & Engenharia de IA</title>
    <style>
        :root {
            --bg-deep: #0a1425;     /* Fundo mais claro que o anterior */
            --bg-card: #13223d;
            --bg-tile: #1e2f52;
            --accent-glow: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #a3b4cc;
            --border-color: #1e2f52;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.7;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            background-color: rgba(19, 34, 61, 0.92);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 75px;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .logo span {
            color: var(--accent-glow);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 32px;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        nav a:hover, nav a.active {
            color: var(--accent-glow);
        }

        /* HERO */
        .hero {
            padding: 180px 0 120px 0;
            min-height: 90vh;
            display: flex;
            align-items: center;
            background: radial-gradient(circle at 85% 25%, rgba(56, 189, 248, 0.18) 0%, transparent 55%);
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent, rgba(10, 20, 37, 0.6));
            pointer-events: none;
        }

        .hero-content {
            max-width: 820px;
            position: relative;
        }
        .hero-tag {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: var(--accent-glow);
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 50px;
            margin-bottom: 20px;
        }
        .hero h1 {
            font-size: 3.8rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
        }
        .typewriter-container {
            font-size: 1.65rem;
            color: var(--text-muted);
            min-height: 55px;
            margin: 25px 0;
        }
        .cursor {
            color: var(--accent-glow);
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .hero-p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 680px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #1e2f52, #13223d);
            color: white;
            padding: 16px 36px;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.4);
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--accent-glow);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
        }

        /* SEÇÕES */
        .section {
            padding: 110px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .section-title {
            font-size: 2.4rem;
            margin-bottom: 60px;
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 65px;
            height: 4px;
            background: var(--accent-glow);
            border-radius: 2px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 28px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            transition: all 0.4s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-glow);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .card-meta {
            color: var(--accent-glow);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .card h3 {
            font-size: 1.4rem;
            margin-bottom: 16px;
        }
        .card p {
            color: var(--text-muted);
            flex-grow: 1;
        }

            margin-top
